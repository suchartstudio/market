<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>งานดีขอนแก่น - เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 🎨 ระบบตัวแปรสีรองรับโหมดสว่าง/มืด */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #222222;
            --text-sub: #666666;
            --border-color: #dddddd;
            --btn-google: #ffffff;
            --btn-google-text: #333333;
        }
        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #bbbbbb;
            --border-color: #444444;
            --btn-google: #333333;
            --btn-google-text: #ffffff;
        }

        body { font-family: 'Chakra Petch', sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-size: 18px; transition: background 0.3s; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); text-align: center; width: 100%; max-width: 450px; border: 1px solid var(--border-color); }
        
        /* ชื่อแพลตฟอร์มตัวใหญ่ */
        h1.app-title { font-size: 42px; color: #007BFF; margin: 0 0 10px 0; font-weight: 700; }
        p.subtitle { font-size: 20px; color: var(--text-sub); margin-bottom: 30px; }
        
        .role-selection { text-align: left; background: var(--bg-color); padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border-color); }
        .role-selection label { display: block; margin: 12px 0; font-size: 20px; cursor: pointer; color: var(--text-main); }
        .role-selection input { transform: scale(1.5); margin-right: 15px; }

        .btn-google { background: var(--btn-google); color: var(--btn-google-text); border: 2px solid var(--border-color); padding: 15px 20px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 100%; font-size: 20px; font-weight: 600; font-family: inherit; transition: 0.2s; }
        .btn-google:hover { background: #f1f1f1; color: #333; }
        
        /* ปุ่มสลับโหมด */
        .theme-toggle { position: absolute; top: 20px; right: 20px; background: var(--card-bg); border: 2px solid var(--border-color); color: var(--text-main); font-size: 24px; padding: 10px; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="สลับโหมดสว่าง/มืด">🌓</button>

    <div class="login-card">
        <h1 class="app-title">งานดีขอนแก่น</h1>
        <p class="subtitle">แพลตฟอร์มรวมช่างและงานบริการ</p>
        
        <div class="role-selection">
            <label style="font-weight: bold; font-size: 22px; margin-bottom: 15px; color: #007BFF;">คุณคือใคร?</label>
            <label><input type="radio" name="role" value="customer" checked> 👤 ผู้ใช้บริการ (หาช่าง)</label>
            <label><input type="radio" name="role" value="provider"> 🛠️ ผู้ให้บริการ (รับงาน)</label>
        </div>

        <button class="btn-google" id="btn-login">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="28" style="margin-right: 15px;">
            เข้าสู่ระบบด้วย Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // *** ใส่ Config ของคุณ ***
        const firebaseConfig = {
            apiKey: "AIzaSyBCtuNjcjOmDS1Luwg4-B5VoMrnFvlAUFI",
            authDomain: "marketplace-3c894.firebaseapp.com",
            projectId: "marketplace-3c894",
            storageBucket: "marketplace-3c894.firebasestorage.app"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('btn-login').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const role = document.querySelector('input[name="role"]:checked').value;
                
                const docRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(docRef);
                
                if (!docSnap.exists()) {
                    await setDoc(docRef, { name: user.displayName, email: user.email, role: role, created_at: new Date() });
                }
                window.location.href = "dashboard.html";
            } catch (error) { alert("ล้มเหลว: " + error.message); }
        });
    </script>
    <script>
        // ระบบจำโหมดสี (Light/Dark Mode)
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);

        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }
    </script>
</body>
</html>
