<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - งานดีขอนแก่น</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 🎨 ระบบตัวแปรสีตั้งต้น (โหมดสว่าง) */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #222222;
            --text-sub: #666666;
            --border-color: #dddddd;
            --customer-color: #28a745;
            --provider-color: #fd7e14;
            --profile-bg: #f8f9fa;
        }
        
        /* 🌑 อ่านค่าจากระบบเครื่องอัตโนมัติ (Dark Mode) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-main: #ffffff;
                --text-sub: #bbbbbb;
                --border-color: #444444;
                --customer-color: #34c759;
                --provider-color: #e85d04;
                --profile-bg: #2a2a2a;
            }
        }

        body { font-family: 'Chakra Petch', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 20px; text-align: center; font-size: 18px; margin: 0; transition: background 0.3s, color 0.3s; }
        .card { background: var(--card-bg); padding: 40px; border-radius: 20px; max-width: 550px; margin: 40px auto; box-shadow: 0 8px 24px rgba(0,0,0,0.15); border: 1px solid var(--border-color); transition: background 0.3s, border-color 0.3s; }
        
        h1 { font-size: 36px; margin-top: 0; font-weight: 700; color: #007BFF; }
        
        .user-profile { background: var(--profile-bg); padding: 20px; border-radius: 12px; margin-bottom: 25px; text-align: left; border: 1px solid var(--border-color); line-height: 1.6; }
        .user-profile b { font-size: 20px; }
        
        .menu-section { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        
        /* ปรับกระดุมเมนูให้มีขนาดใหญ่ ยืนยันคำสั่งอ่านง่ายตามคอนเซ็ปต์ */
        .menu-btn { padding: 18px 20px; color: white; border: none; border-radius: 12px; cursor: pointer; font-family: inherit; font-size: 22px; font-weight: 700; text-align: left; display: flex; align-items: center; gap: 12px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .menu-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .btn-customer { background-color: var(--customer-color); }
        .btn-provider { background-color: var(--provider-color); }
        
        .btn-logout { background: #dc3545; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-family: inherit; font-size: 20px; font-weight: 700; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-logout:hover { background: #c82333; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛠️ ศูนย์ควบคุมระบบ</h1>
        <div class="user-profile" id="user-info">กำลังโหลดข้อมูลโปรไฟล์ของท่าน...</div>
        
        <div class="menu-section" id="role-menus"></div>
        
        <button class="btn-logout" id="btn-logout">🚪 ออกจากระบบ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // *** ใช้ Config ตัวเดิมของแพลตฟอร์มคุณ ***
        const firebaseConfig = {
            apiKey: "AIzaSyBCtuNjcjOmDS1Luwg4-B5VoMrnFvlAUFI",
            authDomain: "marketplace-3c894.firebaseapp.com",
            projectId: "marketplace-3c894",
            storageBucket: "marketplace-3c894.firebasestorage.app"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) return window.location.href = "index.html";
            
            try {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                const data = docSnap.exists() ? docSnap.data() : { role: "customer", name: "ผู้ใช้บริการ" };
                
                let roleDisplay = "ไม่ทราบสถานะ";
                if(data.role === 'customer') roleDisplay = '👤 ผู้ใช้บริการ (ลูกค้า)';
                if(data.role === 'provider') roleDisplay = '🛠️ ผู้ให้บริการ (ช่าง/รับจ้าง)';

                document.getElementById('user-info').innerHTML = `
                    <b>👤 ชื่อผู้ใช้:</b> ${data.name || "ผู้ใช้งาน"} <br>
                    <b>📧 อีเมล:</b> ${user.email} <br>
                    <b>🛡️ สิทธิ์ระบบ:</b> <span style="color:#007BFF; font-weight:bold;">${roleDisplay}</span>
                `;

                let menusHTML = "";
                
                // 🟢 เมนูแสดงผลของฝั่ง "ลูกค้า (Customer)" ตัวหนังสือใหญ่เด่นชัด
                if (data.role === "customer") {
                    menusHTML = `
                        <button class="menu-btn btn-customer" onclick="location.href='services.html'">🔍 ค้นหาและเลือกจ้างบริการ (แบบการ์ด)</button>
                        <button class="menu-btn btn-customer" style="background-color: #007BFF;" onclick="location.href='map.html'">🗺️ ค้นหาและเลือกจ้างบริการ (แบบแผนที่)</button>
                        <button class="menu-btn btn-customer" onclick="location.href='my-bookings.html'">📅 ตารางงานที่ฉันจองคิวไว้</button>
                    `;
                } 
                // 🟠 เมนูแสดงผลของฝั่ง "ผู้ให้บริการ / ช่าง (Provider)"
                else if (data.role === "provider") {
                    menusHTML = `
                        <button class="menu-btn btn-provider" onclick="location.href='provider-setup.html'">🛠️ ตั้งค่าโปรไฟล์และตำแหน่งช่าง</button>
                        <button class="menu-btn btn-provider" onclick="location.href='my-services.html'">📋 จัดการรายการบริการและราคา</button>
                        <button class="menu-btn btn-provider" onclick="location.href='provider-jobs.html'">🔔 ดูรายการงานที่มีลูกค้าจ้างเข้ามา</button>
                    `;
                } else {
                    menusHTML = `<p style="color:red; font-weight:bold;">⚠️ ตรวจพบข้อผิดพลาด: สิทธิ์ในระบบฐานข้อมูลไม่ถูกต้อง (${data.role})</p>`;
                }
                
                document.getElementById('role-menus').innerHTML = menusHTML;

            } catch (e) {
                console.error(e);
                document.getElementById('user-info').innerText = "เกิดข้อผิดพลาดในการดึงข้อมูลจากเซิร์ฟเวอร์";
            }
        });

        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.href = "index.html");
    </script>
</body>
</html>
